databases:
  - name: osi-model-db
    databaseName: osi_guide_db
    user: osi_user

services:
  - type: web
    name: osi-guide
    runtime: python3
    buildCommand: "./build.sh"
    startCommand: "gunicorn osi_guide.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: osi-model-db
          property: connectionString
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: osi-guide
          property: host